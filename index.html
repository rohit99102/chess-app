<!DOCTYPE html>
<html>
<head>
  <title>Chess Puzzle App - Full Board</title>
  <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/1.0.0-beta.6/chess.min.js"></script>
  <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCXNSKFSsRjK9I3_pYP_GMtiyjhODOhhnQ",
      authDomain: "chesspuzzleapp.firebaseapp.com",
      databaseURL: "https://chesspuzzleapp-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "chesspuzzleapp",
      storageBucket: "chesspuzzleapp.firebasestorage.app",
      messagingSenderId: "812927630396",
      appId: "1:812927630396:web:79e4f2d10ecd635795d739"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let board, game, currentPuzzle;

    async function loadPuzzle() {
      try {
        const snapshot = await get(ref(db, "puzzles"));
        if (!snapshot.exists()) throw new Error("No puzzles");

        const puzzles = snapshot.val();
        const keys = Object.keys(puzzles);
        const randomKey = keys[Math.floor(Math.random() * keys.length)];
        currentPuzzle = puzzles[randomKey];

        document.getElementById("puzzleText").innerHTML = `
          <h2>${currentPuzzle.title || 'Puzzle'}</h2>
          <div>Solution move: ${currentPuzzle.solution}</div>
          <div id="board" style="width:500px;height:500px;margin:20px auto;"></div>
        `;

        game = new Chess(currentPuzzle.fen);
        board = Chessboard('board', {
          draggable: true,
          position: currentPuzzle.fen,
          onDrop: onDrop
        });

      } catch (error) {
        document.getElementById("puzzleText").innerHTML = "❌ No puzzles in Firebase. Add to /puzzles path.";
      }
    }

    function onDrop(source, target) {
      const move = game.move({ from: source, to: target });
      if (move === null) return 'snapback';

      if (move.san === currentPuzzle.solution) {
        document.getElementById("puzzleText").innerHTML += "<h3 style='color:green;'>✅ CORRECT! Next puzzle...</h3>";
        setTimeout(loadPuzzle, 1500);
      } else {
        game.undo();
        document.getElementById("puzzleText").innerHTML += "<div style='color:red;'>❌ Wrong! Try again.</div>";
      }
    }

    window.onload = loadPuzzle;
  </script>
  <style>
    body { font-family: Arial; background: #f0f0f0; padding: 20px; }
    #puzzleText { background: white; padding: 20px; border-radius: 10px; margin: 20px auto; max-width: 800px; }
  </style>
</head>
<body>
  <div id="puzzleText">Loading puzzle...</div>
</body>
</html>
