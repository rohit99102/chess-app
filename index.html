<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess Puzzle App</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0b1020;
  color:#fff;
  text-align:center;
}
.board {
  width:320px;
  height:320px;
  margin:20px auto;
  display:grid;
  grid-template-columns:repeat(8,1fr);
}
.square {
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  cursor:pointer;
}
.light { background:#f0d9b5; color:black; }
.dark { background:#b58863; color:black; }

button {
  padding:10px 20px;
  margin:10px;
  border:none;
  border-radius:10px;
  background:#6d5df6;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>🔥 Chess Puzzle</h2>
<p>Streak: <span id="streak">0</span></p>
<p>Timer: <span id="timer">10</span></p>

<div id="board" class="board"></div>

<p id="status">Loading...</p>

<button onclick="nextPuzzle()">Next</button>

<script type="module">
import { Chess } from "https://cdn.jsdelivr.net/npm/chess.js@1.0.0-beta.8/+esm";

const boardEl = document.getElementById("board");
const statusEl = document.getElementById("status");

let game = new Chess();
let puzzles = [];
let current = null;
let selected = null;
let streak = 0;
let timer = 10;
let timerId;

const pieces = {
  K:"♔",Q:"♕",R:"♖",B:"♗",N:"♘",P:"♙",
  k:"♚",q:"♛",r:"♜",b:"♝",n:"♞",p:"♟"
};

function parseTXT(text){
  return text.split("\n")
    .map(l=>l.trim())
    .filter(l=>l)
    .map(line=>{
      const p = line.split(" ");
      return {
        fen:p[0],
        solution:p[1],
        rating:parseInt(p[2]) || 1000
      };
    });
}

async function loadPuzzles(){
  try{
    const res = await fetch("/puzzles.txt");
    const text = await res.text();
    puzzles = parseTXT(text);

    if(!puzzles.length) throw "empty";

  }catch(e){
    puzzles = [{
      fen:"8/8/8/8/8/8/5K2/6Rk w - - 0 1",
      solution:"g1g8",
      rating:500
    }];
  }

  loadPuzzle(0);
}

function loadPuzzle(i){
  current = puzzles[i % puzzles.length];
  game = new Chess(current.fen);
  selected = null;

  render();
  startTimer();
  statusEl.textContent = "Find best move";
}

function render(){
  boardEl.innerHTML="";
  const board = game.board();

  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){
      const sq = document.createElement("div");
      sq.className = "square " + ((r+c)%2?"dark":"light");

      const piece = board[r][c];
      if(piece){
        const code = piece.color==="w"?piece.type.toUpperCase():piece.type;
        sq.textContent = pieces[code];
      }

      const name = "abcdefgh"[c] + (8-r);
      sq.onclick = ()=>clickSquare(name);

      boardEl.appendChild(sq);
    }
  }
}

function clickSquare(square){
  if(!selected){
    const piece = game.get(square);
    if(!piece) return;
    selected = square;
    return;
  }

  const move = game.move({
    from:selected,
    to:square,
    promotion:"q"
  });

  selected = null;

  if(!move){
    statusEl.textContent="Illegal move";
    return;
  }

  const uci = move.from + move.to;
  if(uci !== current.solution){
    streak = 0;
    statusEl.textContent="❌ Wrong";
    return;
  }

  streak++;
  document.getElementById("streak").textContent = streak;

  statusEl.textContent="✅ Correct!";
  clearInterval(timerId);

  setTimeout(nextPuzzle,500);
}

function nextPuzzle(){
  loadPuzzle(Math.floor(Math.random()*puzzles.length));
}

function startTimer(){
  clearInterval(timerId);
  timer = 10;
  updateTimer();

  timerId = setInterval(()=>{
    timer--;
    updateTimer();
    if(timer<=0){
      clearInterval(timerId);
      streak=0;
      statusEl.textContent="⏰ Time up";
    }
  },1000);
}

function updateTimer(){
  document.getElementById("timer").textContent = timer;
}

loadPuzzles();
</script>

</body>
</html>
